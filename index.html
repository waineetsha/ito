<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ito オンライン</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ローディング -->
<div id="loading">
  <div class="spinner"></div>
  <p id="loading-msg">読み込み中...</p>
</div>

<!-- トースト -->
<div id="toast"></div>

<div id="app">

  <!-- ===== TOP SCREEN ===== -->
  <div id="screen-top" class="screen">
    <div class="logo-wrap">
      <div class="logo">it<span>o</span></div>
      <div class="logo-sub">数字カードゲーム オンライン版</div>
    </div>
    <div class="top-actions">
      <button class="btn-primary" id="btn-create-room">ルームを作成</button>
      <button class="btn-ghost" id="btn-join-manual">ルームIDで参加</button>
    </div>
  </div>

  <!-- ===== NAME INPUT SCREEN ===== -->
  <div id="screen-name" class="screen">
    <div class="logo-wrap">
      <div class="logo" style="font-size: 48px;">it<span>o</span></div>
    </div>
    <div class="card">
      <div class="section-label">あなたの名前</div>
      <div class="name-form">
        <input type="text" id="input-name" placeholder="名前を入力..." maxlength="12" autofocus />
        <div class="error-msg" id="name-error" style="display:none;"></div>
        <div class="join-info" id="name-join-info"></div>
        <button class="btn-primary" id="btn-join">参加する</button>
      </div>
    </div>
  </div>

  <!-- ===== LOBBY SCREEN ===== -->
  <div id="screen-lobby" class="screen">
    <div class="logo-wrap">
      <div class="logo" style="font-size: 48px;">it<span>o</span></div>
    </div>

    <!-- 観戦バッジ -->
    <div id="lobby-spectator-badge" class="spectator-badge" style="display:none;">
      <span>👁</span> 観戦中
    </div>

    <!-- URL共有 -->
    <div class="card">
      <div class="section-label">招待URL</div>
      <div class="room-url-box">
        <span class="room-url-text" id="room-url-display"></span>
        <button class="copy-btn" id="btn-copy-url">コピー</button>
      </div>
    </div>

    <!-- プレイヤー一覧 -->
    <div class="card">
      <div class="section-label">プレイヤー</div>
      <div class="player-list" id="lobby-players"></div>

      <div id="lobby-spectator-section" style="display:none;">
        <hr class="divider" />
        <div class="section-label">観戦者</div>
        <div class="player-list" id="lobby-spectators"></div>
      </div>

      <p class="lobby-status" id="lobby-status"></p>
    </div>

    <!-- ホスト操作 -->
    <div id="lobby-host-area" style="display:none;">
      <button class="btn-success" id="btn-start-game">ゲーム開始</button>
    </div>
  </div>

  <!-- ===== PLAY SCREEN ===== -->
  <div id="screen-play" class="screen">

    <!-- 観戦バッジ -->
    <div id="play-spectator-badge" class="spectator-badge" style="display:none;">
      <span>👁</span> 観戦中
    </div>

    <!-- テーマ -->
    <div class="theme-box">
      <div class="section-label" style="color:#ff3c3c; text-align:center;">お題</div>
      <div class="theme-title" id="play-theme"></div>
      <div class="theme-scale" id="play-theme-scale"></div>
    </div>

    <!-- 自分のカード -->
    <div id="my-card-area" class="my-card-wrap">
      <div class="my-card" id="my-card-num">?</div>
    </div>

    <!-- ヒント入力 -->
    <div id="hint-input-area" class="hint-area" style="display:none;">
      <input type="text" id="hint-input" placeholder="ヒントを入力（何度でも変更OK）" maxlength="20" />
      <button id="btn-submit-hint">送信</button>
    </div>

    <!-- ヒント一覧 -->
    <div class="card">
      <div class="section-label">ヒント一覧</div>
      <div id="hints-list" class="hints-list"></div>
    </div>

    <!-- 並び替えボード -->
    <div class="card">
      <div class="section-label">並び替えボード</div>
      <div class="sort-board-label">
        <span>⬅ 弱い・小さい・少ない</span>
        <span>強い・大きい・多い ➡</span>
      </div>
      <div id="sort-board" class="sort-board"></div>
      <p class="drag-hint" id="drag-hint-text">ドラッグして並び替え</p>
    </div>

    <!-- ホスト操作 -->
    <div id="host-controls-play" class="host-controls" style="display:none;">
      <div class="host-controls-label">ホスト操作</div>
      <div class="host-btn-row">
        <button class="btn-warn" id="btn-theme-change">お題チェンジ</button>
        <button class="btn-primary" id="btn-confirm-order">順番確定</button>
      </div>
    </div>

  </div>

  <!-- ===== RESULT SCREEN ===== -->
  <div id="screen-result" class="screen">

    <div class="result-badge">
      <div class="result-label" id="result-label">成功！</div>
    </div>

    <div class="card">
      <div class="section-label">カード公開（予想順）</div>
      <div id="result-order" class="result-order"></div>
    </div>

    <!-- ホスト操作 -->
    <div id="result-host-controls" style="display:none;">
      <button class="btn-primary" id="btn-again">もう一度</button>
    </div>

  </div>

</div><!-- /#app -->

<script type="module" src="app.js"></script>
</body>
</html>
