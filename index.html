<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ito online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body>

<div class="noise"></div>

<!-- ログイン画面 -->
<div id="screen-login" class="screen active">
  <div class="login-wrap">
    <div class="logo-block">
      <div class="logo-ito">ito</div>
      <div class="logo-sub">online</div>
    </div>

    <!-- ルーム作成 -->
    <div class="login-card" id="card-create">
      <p class="login-label">ルームを作成</p>
      <input id="name-create" class="text-input" placeholder="あなたの名前" maxlength="12" autocomplete="off">
      <button class="btn btn-primary" onclick="createRoom()">作成する</button>
    </div>

    <div class="login-divider">または</div>

    <!-- ルーム参加 -->
    <div class="login-card" id="card-join">
      <p class="login-label">ルームに参加</p>
      <input id="room-code" class="text-input" placeholder="ルームコード" maxlength="6" autocomplete="off" style="text-transform:uppercase">
      <input id="name-join" class="text-input" placeholder="あなたの名前" maxlength="12" autocomplete="off">
      <button class="btn btn-ghost" onclick="joinRoom()">参加する</button>
    </div>
  </div>
</div>

<!-- ロビー画面 -->
<div id="screen-lobby" class="screen">
  <div class="lobby-wrap">
    <div class="room-code-display">
      <div class="section-title">ルームコード</div>
      <div class="room-code" id="roomCodeDisplay"></div>
      <div class="room-code-hint">このコードを仲間に共有しよう</div>
    </div>
    <div class="section-title">参加者</div>
    <div id="players" class="player-list"></div>
    <div class="lobby-actions">
      <button class="btn btn-primary" id="startBtn" onclick="startGame()">ゲーム開始</button>
      <p class="host-note" id="hostNote">ホストの開始を待っています…</p>
    </div>
  </div>
</div>

<!-- ゲーム画面 -->
<div id="screen-game" class="screen">

  <!-- カード表示エリア -->
  <div class="card-section">
    <div class="theme-label">テーマ</div>
    <div id="theme" class="theme-text"></div>
    <div class="my-card-wrap">
      <div class="my-card-label">あなたのカード</div>
      <div class="my-card" id="card">—</div>
    </div>
  </div>

  <!-- ヒント入力 -->
  <div class="hint-section">
    <div class="section-title">ヒントを入力</div>
    <div class="hint-input-row">
      <input id="hint" class="text-input" placeholder="数字を表すヒント…" autocomplete="off">
      <button class="btn btn-accent" onclick="updateHint()">送信</button>
    </div>
  </div>

  <!-- ヒント一覧 -->
  <div class="hints-section">
    <div class="section-title">みんなのヒント</div>
    <ul id="hintList" class="hint-list"></ul>
  </div>

  <!-- 並び替え -->
  <div class="order-section">
    <div class="section-title">小さい順に並べよう <span class="drag-note">↕ ドラッグで並び替え</span></div>
    <ul id="order" class="order-list"></ul>
    <button class="btn btn-primary full-width" id="checkBtn" onclick="check()">結果を確認</button>
  </div>

  <!-- 結果 -->
  <div id="result-overlay" class="result-overlay hidden">
    <div class="result-box">
      <div id="result-emoji" class="result-emoji"></div>
      <div id="result-text" class="result-text"></div>
      <div id="result-cards" class="result-cards"></div>
      <button class="btn btn-primary" id="nextRoundBtn" onclick="nextRound()">次のラウンド</button>
      <button class="btn btn-ghost" onclick="closeResult()">閉じる</button>
    </div>
  </div>

</div>

<script src="firebase.js"></script>
<script src="game.js"></script>
</body>
</html>
